<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/assets/public/login/css/login.css">
</head>

<body>

    <!-- O início do painel de login-->
    <main class="login-page">
        <section class="login-card">
            <!-- Brasão -->
            <div class="logo-area">
                <img src="/assets/public/login/img/BrasaoJahu.webp" alt="Brasão Prefeitura" class="logo">
            </div>
            <h1>PREFEITURA MUNICIPAL</h1>
            <h2>TRABALHO • TRANSPARÊNCIA • RESULTADOS</h2>
            <hr>
            <form method="POST" action="/login" class="login-form" id="login-form" autocomplete="on">

                <div class="form-group">
                    <label for="username">Usuário</label>

                    <div class="input-box">
                        <svg class="input-icon" width="15" height="17" viewBox="0 0 15 17" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M7.46038 9.07554C9.69038 9.07554 11.4982 7.26777 11.4982 5.03777C11.4982 2.80777 9.69038 1 7.46038 1C5.23038 1 3.42261 2.80777 3.42261 5.03777C3.42261 7.26777 5.23038 9.07554 7.46038 9.07554Z"
                                stroke="#C2C2C2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <path
                                d="M13.9209 15.5361C13.9209 13.8227 13.2402 12.1795 12.0287 10.9679C10.8171 9.75633 9.17385 9.07568 7.46044 9.07568C5.74702 9.07568 4.10378 9.75633 2.89222 10.9679C1.68065 12.1795 1 13.8227 1 15.5361"
                                stroke="#C2C2C2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>

                        <input id="username" type="text" placeholder="Digite seu usuário" autocomplete="username"
                            name="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>

                    <div class="input-box">
                        <svg class="input-icon" width="16" height="21" viewBox="0 0 16 21" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M8 16C7.46957 16 6.96086 15.7893 6.58579 15.4142C6.21071 15.0391 6 14.5304 6 14C6 12.89 6.89 12 8 12C8.53043 12 9.03914 12.2107 9.41421 12.5858C9.78929 12.9609 10 13.4696 10 14C10 14.5304 9.78929 15.0391 9.41421 15.4142C9.03914 15.7893 8.53043 16 8 16ZM14 19V9H2V19H14ZM14 7C14.5304 7 15.0391 7.21071 15.4142 7.58579C15.7893 7.96086 16 8.46957 16 9V19C16 19.5304 15.7893 20.0391 15.4142 20.4142C15.0391 20.7893 14.5304 21 14 21H2C1.46957 21 0.960859 20.7893 0.585786 20.4142C0.210714 20.0391 0 19.5304 0 19V9C0 7.89 0.89 7 2 7H3V5C3 3.67392 3.52678 2.40215 4.46447 1.46447C5.40215 0.526784 6.67392 0 8 0C8.65661 0 9.30679 0.129329 9.91342 0.380602C10.52 0.631876 11.0712 1.00017 11.5355 1.46447C11.9998 1.92876 12.3681 2.47995 12.6194 3.08658C12.8707 3.69321 13 4.34339 13 5V7H14ZM8 2C7.20435 2 6.44129 2.31607 5.87868 2.87868C5.31607 3.44129 5 4.20435 5 5V7H11V5C11 4.20435 10.6839 3.44129 10.1213 2.87868C9.55871 2.31607 8.79565 2 8 2Z"
                                fill="#C2C2C2" />
                        </svg>

                        <input id="password" type="password" placeholder="Digite sua senha" name="password"
                            autocomplete="current-password" required>

                        <button class="password-eye" type="button" aria-label="Mostrar senha">
                            <svg width="20" height="12" viewBox="0 0 20 12" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M7.54492 11.0886L5.76008 10.6167L6.48714 7.93932C5.39893 7.54332 4.3875 6.96653 3.4967 6.23394L1.50769 8.19622L0.201395 6.90807L2.1904 4.94579C1.0672 3.61909 0.312457 2.02762 0 0.327047L1.8181 0C2.1668 1.88923 3.17675 3.59789 4.67193 4.82816C6.1671 6.05843 8.05268 6.73229 10 6.73229C11.9473 6.73229 13.8329 6.05843 15.3281 4.82816C16.8232 3.59789 17.8332 1.88923 18.1819 0L20 0.326136C19.6874 2.02712 18.9323 3.61893 17.8087 4.94579L19.7986 6.90807L18.4923 8.19622L16.5024 6.23394C15.6116 6.96653 14.6001 7.54332 13.5119 7.93932L14.2399 10.6176L12.4551 11.0886L11.7271 8.4103C10.5838 8.60479 9.41524 8.60479 8.27198 8.4103L7.54492 11.0886Z"
                                    fill="black" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button class="login-button" type="submit">Entrar</button>

                <a href="#" class="forgot-password">
                    Esqueci minha senha
                    <span>›</span>
                </a>

            </form>
        </section>
    </main>
    <script src="/assets/public/login/js/login.js"></script>
</body>

</html>
